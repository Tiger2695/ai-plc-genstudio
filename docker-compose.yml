version: '3.8'

services:
  # 🏭 1. Backend Service Configuration
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL_NAME=gemini-2.5-flash-lite
    restart: always

  # 💻 2. Frontend Service Configuration
  frontend:
    build:
      context: ./frontend
    ports:
      - "8501:8501"
    environment:
      # 💡 Desi Logic: Docker network ke andar frontend directly IP ke bajay 'backend' name se route dhoond lega!
      - BACKEND_URL=http://backend:8000
    restart: always
    depends_on:
      - backend